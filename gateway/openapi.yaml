        project_root:
          type: string
        provider:
          type: string
        model:
          type: string
        mcp_servers:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        subagents:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        default_mcp_servers:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
