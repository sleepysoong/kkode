openapi: 3.0.3
info:
  title: kkode Gateway API
  version: 0.1.0
  description: |
    kkode의 session-aware coding agent gateway API예요.
    REST는 session/run 제어면을 담당하고, SSE는 event replay/stream을 담당해요.
servers:
  - url: http://127.0.0.1:41234
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: 프로세스 health를 확인해요.
      security: []
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: 정상이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      operationId: getReadyz
      summary: gateway 준비 상태를 확인해요.
      security: []
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: 준비됐어요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /api/v1:
    get:
      operationId: getAPIIndex
      summary: API discovery index를 반환해요.
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: 주요 API link 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIIndexResponse'
  /api/v1/openapi.yaml:
    get:
      operationId: getOpenapiYaml
      summary: 현재 OpenAPI YAML 스펙을 반환해요.
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: OpenAPI YAML 문서예요.
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/version:
    get:
      operationId: getVersion
      summary: gateway version과 provider 목록을 반환해요.
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: version 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      summary: gateway 기능과 provider capability를 반환해요.
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: gateway capability discovery 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
  /api/v1/diagnostics:
    get:
      operationId: getDiagnostics
      summary: gateway 운영 진단 정보를 반환해요.
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: diagnostics 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsResponse'
  /api/v1/providers:
    get:
      operationId: getProviders
      summary: gateway가 알고 있는 provider 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: provider 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'
  /api/v1/providers/{provider}:
    get:
      operationId: getProvidersByProvider
      summary: provider 이름이나 alias로 provider 상세를 반환해요.
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      responses:
        '200':
          description: provider 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/providers/{provider}/test:
    post:
      operationId: postProvidersByProviderTest
      summary: provider 단독 preflight와 선택적 live smoke를 실행해요.
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderTestRequest'
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: provider test 결과예요. live 실패도 ok=false 본문으로 반환할 수 있어요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderTestResponse'
  /api/v1/models:
    get:
      operationId: getModels
      summary: provider별 model catalog를 반환해요.
      parameters:
        - in: query
          name: provider
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: model 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
  /api/v1/stats:
    get:
      operationId: getStats
      summary: gateway dashboard 통계를 반환해요.
      responses:
        '200':
          description: 저장소 통계예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '501':
          $ref: '#/components/responses/Error'
  /api/v1/files:
    get:
      operationId: getFiles
      summary: workspace 디렉터리 항목을 나열해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          schema:
            type: string
            default: .
        - in: query
          name: limit
          schema:
            type: integer
            default: 500
            maximum: 5000
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: file entry 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/content:
    get:
      operationId: getFilesContent
      summary: workspace 파일 내용을 읽어요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          required: true
          schema:
            type: string
        - in: query
          name: offset_line
          schema:
            type: integer
        - in: query
          name: limit_lines
          schema:
            type: integer
        - in: query
          name: max_bytes
          schema:
            type: integer
            default: 1048576
            minimum: 0
            maximum: 8388608
      responses:
        '200':
          description: file content예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '400':
          $ref: '#/components/responses/Error'
    put:
      operationId: putFilesContent
      summary: workspace 파일 내용을 써요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileWriteRequest'
      responses:
        '200':
          description: 저장된 file content예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/grep:
    get:
      operationId: getFilesGrep
      summary: workspace 파일에서 문자열 또는 regex를 검색해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: pattern
          required: true
          schema:
            type: string
        - in: query
          name: path_glob
          schema:
            type: string
        - in: query
          name: regex
          schema:
            type: boolean
            default: false
          description: true/false, 1/0, yes/no 값을 받아요. 다른 값은 400으로 거부해요.
        - in: query
          name: case_sensitive
          schema:
            type: boolean
            default: false
          description: true/false, 1/0, yes/no 값을 받아요. 다른 값은 400으로 거부해요.
        - in: query
          name: max_matches
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: grep 검색 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileGrepResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/delete:
    post:
      operationId: postFilesDelete
      summary: workspace 파일이나 디렉터리를 삭제해요.
      description: 권한 프롬프트 없이 project_root 기준으로 즉시 삭제해요. 디렉터리는 recursive=true가 필요해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileDeleteRequest'
      responses:
        '200':
          description: file delete 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/move:
    post:
      operationId: postFilesMove
      summary: workspace 파일이나 디렉터리를 이동하거나 이름을 바꿔요.
      description: 권한 프롬프트 없이 project_root 기준으로 즉시 이동해요. destination이 있으면 overwrite=true가 필요해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileMoveRequest'
      responses:
        '200':
          description: file move 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMoveResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/glob:
    get:
      operationId: getFilesGlob
      summary: workspace 파일 경로를 glob 패턴으로 찾아요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: pattern
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 500
            maximum: 5000
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: glob 검색 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileGlobResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/patch:
    post:
      operationId: postFilesPatch
      summary: apply_patch 형식 patch를 workspace에 적용해요.
      description: 권한 프롬프트 없이 project_root 기준으로 즉시 적용하고, 적용 전 file checkpoint를 남겨요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilePatchRequest'
      responses:
        '200':
          description: patch 적용 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilePatchResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/restore:
    post:
      operationId: postFilesRestore
      summary: file checkpoint를 workspace에 복구해요.
      description: `/api/v1/files/*` 쓰기 응답이나 `file_*` tool output의 checkpoint_id를 받아 해당 snapshot을 복구해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileRestoreRequest'
      responses:
        '200':
          description: file checkpoint restore 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileRestoreResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/checkpoints:
    get:
      operationId: getFilesCheckpoints
      summary: workspace file checkpoint 목록을 반환해요.
      description: 파일 쓰기/delete/move/patch 전 생성된 checkpoint metadata를 반환해요. 파일 내용 snapshot은 응답하지 않아요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 500
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: file checkpoint 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCheckpointListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/checkpoints/prune:
    post:
      operationId: postFilesCheckpointsPrune
      summary: 오래된 workspace file checkpoint snapshot을 정리해요.
      description: 최신 keep_latest개 checkpoint만 남기고 나머지를 삭제해요. 파일 내용 snapshot은 응답하지 않아요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileCheckpointPruneRequest'
      responses:
        '200':
          description: file checkpoint prune 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCheckpointPruneResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/checkpoints/{checkpoint_id}:
    get:
      operationId: getFilesCheckpointsByCheckpointId
      summary: workspace file checkpoint metadata를 반환해요.
      parameters:
        - in: path
          name: checkpoint_id
          required: true
          schema:
            type: string
        - in: query
          name: project_root
          required: true
          schema:
            type: string
      responses:
        '200':
          description: file checkpoint metadata예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCheckpointListResponse'
        '400':
          $ref: '#/components/responses/Error'
    delete:
      operationId: deleteFilesCheckpointsByCheckpointId
      summary: workspace file checkpoint snapshot을 삭제해요.
      parameters:
        - in: path
          name: checkpoint_id
          required: true
          schema:
            type: string
        - in: query
          name: project_root
          required: true
          schema:
            type: string
      responses:
        '200':
          description: file checkpoint delete 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCheckpointDeleteResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/git/status:
    get:
      operationId: getGitStatus
      summary: workspace git status를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
      responses:
        '200':
          description: git status 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitStatusResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/git/diff:
    get:
      operationId: getGitDiff
      summary: workspace git diff를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          schema:
            type: string
        - in: query
          name: max_bytes
          schema:
            type: integer
            default: 1048576
      responses:
        '200':
          description: git diff 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitDiffResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/git/log:
    get:
      operationId: getGitLog
      summary: workspace git log를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: git log 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitLogResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/tools:
    get:
      operationId: getTools
      summary: 표준 file/shell/web tool 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: tool 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'
  /api/v1/tools/{tool}:
    get:
      operationId: getToolsByTool
      summary: 표준 tool 상세 schema를 반환해요.
      parameters:
        - in: path
          name: tool
          required: true
          schema:
            type: string
      responses:
        '200':
          description: tool 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/tools/call:
    post:
      operationId: postToolsCall
      summary: 표준 tool을 직접 실행해요.
      description: 권한 프롬프트 없이 표준 tool을 바로 실행해요. file/shell tool은 project_root가 필요하고 web_fetch는 project_root 없이도 실행할 수 있어요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCallRequest'
      responses:
        '200':
          description: tool 실행 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    get:
      operationId: getSessions
      summary: session 목록을 반환해요.
      parameters:
        - in: query
          name: project_root
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
        - $ref: '#/components/parameters/Offset'
      responses:
        default:
          $ref: '#/components/responses/Error'
        '200':
          description: session 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
    post:
      operationId: postSessions
      summary: 새 session을 만들어요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        default:
          $ref: '#/components/responses/Error'
        '201':
          description: 생성된 session이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /api/v1/sessions/import:
    post:
      operationId: postSessionsImport
      summary: session export bundle을 import해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionImportRequest'
      responses:
        '201':
          description: import 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionImportResponse'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSessionsBySessionId
      summary: session 상세를 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: session 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/export:
    get:
      operationId: getSessionsBySessionIdExport
      summary: session export JSON을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: checkpoint_limit
          schema:
            type: integer
            default: 200
            maximum: 5000
        - in: query
          name: run_limit
          schema:
            type: integer
            default: 200
            maximum: 5000
        - in: query
          name: turn_limit
          schema:
            type: integer
            maximum: 5000
          description: export response의 turns 배열을 이 개수까지 잘라요. raw_session에는 적용하지 않아요.
        - in: query
          name: event_limit
          schema:
            type: integer
            maximum: 5000
          description: export response의 events 배열을 이 개수까지 잘라요. raw_session에는 적용하지 않아요.
        - in: query
          name: include_raw
          schema:
            type: boolean
            default: true
          description: false면 import용 raw_session snapshot을 응답에서 제외해서 preview payload를 줄여요. 잘못된 boolean 값은 400으로 거부해요.
        - in: query
          name: redact
          schema:
            type: boolean
            default: false
          description: true면 raw_session을 제외하고 secret 패턴을 마스킹해요. 잘못된 boolean 값은 400으로 거부해요.
      responses:
        '200':
          description: session export bundle이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionExportResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/compact:
    post:
      operationId: postSessionsBySessionIdCompact
      summary: session turn을 extractive summary로 압축해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCompactRequest'
      responses:
        '200':
          description: compaction 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCompactResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/fork:
    post:
      operationId: postSessionsBySessionIdFork
      summary: 기존 session을 fork해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                at_turn_id:
                  type: string
      responses:
        default:
          $ref: '#/components/responses/Error'
        '201':
          description: fork된 session이에요.
          content:
