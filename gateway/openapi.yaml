      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
    MCPResourceListResponse:
      type: object
      required: [server, resources]
      properties:
        server:
          $ref: '#/components/schemas/Resource'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/MCPResource'
    MCPResource:
      type: object
      required: [uri]
      properties:
        uri:
          type: string
        name:
          type: string
        description:
          type: string
        mime_type:
          type: string
    MCPResourceReadResponse:
      type: object
      required: [server, uri, contents]
      properties:
        server:
          $ref: '#/components/schemas/Resource'
        uri:
          type: string
        contents:
