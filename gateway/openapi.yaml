  /api/v1/runs:
    get:
      operationId: getRuns
      summary: background run 목록을 반환해요.
      parameters:
        - in: query
          name: session_id
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: request_id
          schema:
            type: string
            maxLength: 128
          description: "`X-Request-Id`에서 run metadata로 전파된 request id로 좁혀요."
        - in: query
          name: idempotency_key
          schema:
            type: string
            maxLength: 128
          description: "`Idempotency-Key` 또는 metadata.idempotency_key로 저장된 key로 좁혀요."
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: 다음 page를 가져올 0-based run offset이에요. 응답의 next_offset을 그대로 넣으면 돼요.
      responses:
        '200':
          description: run 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'
        '501':
          $ref: '#/components/responses/Error'
    post:
      operationId: postRuns
      summary: agent background run을 시작해요.
      description: gateway는 run을 즉시 접수하고 실제 agent 실행은 background RunManager에서 이어가요. `Idempotency-Key` header나 `metadata.idempotency_key`가 같으면 기존 run을 반환해요.
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
            maxLength: 128
          description: 같은 run 생성 요청의 재시도를 묶는 key예요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunStartRequest'
      responses:
        '200':
          description: 같은 idempotency key의 기존 run을 반환했어요.
          headers:
            X-Idempotent-Replay:
              schema:
                type: string
              description: 기존 run 재사용이면 `true`예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '202':
          description: run이 접수됐어요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '501':
          $ref: '#/components/responses/Error'
