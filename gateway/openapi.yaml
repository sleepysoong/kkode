          type: boolean
    GitLogResponse:
      type: object
      required: [project_root, commits]
      properties:
        project_root:
          type: string
        commits:
          type: array
          items:
            $ref: '#/components/schemas/GitLogEntry'
    GitLogEntry:
      type: object
      required: [hash, subject, raw]
      properties:
        hash:
          type: string
        subject:
          type: string
        raw:
          type: string
    ToolListResponse:
      type: object
      required: [tools]
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
    Tool:
      type: object
      required: [kind, name]
      properties:
        kind:
          type: string
        name:
          type: string
        description:
          type: string
        parameters:
          type: object
          additionalProperties: true
        strict:
          type: boolean
        requires_workspace:
          type: boolean
          description: 직접 호출할 때 project_root가 필요한 tool인지 알려줘요.
