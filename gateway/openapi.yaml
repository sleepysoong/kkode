        - in: path
          name: request_id
          required: true
          schema:
            type: string
            maxLength: 128
        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
        - in: query
          name: stream
          schema:
            type: boolean
            default: false
          description: true면 현재 replay 뒤 연결된 live run event를 SSE로 이어 받아요. 잘못된 boolean 값은 400으로 거부해요.
        - in: query
          name: heartbeat_ms
          schema:
            type: integer
            default: 15000
            minimum: 0
            maximum: 300000
          description: SSE idle heartbeat 주기예요. 잘못된 값은 400으로 거부하고 0은 기본 15초, 너무 낮은 값은 10ms로 보정해요.
      responses:
        '200':
