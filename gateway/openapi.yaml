              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SessionID:
      in: path
      name: session_id
      required: true
      schema:
        type: string
    RunID:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    ResourceID:
      in: path
      name: resource_id
      required: true
      schema:
        type: string
    Enabled:
      in: query
      name: enabled
      schema:
        type: boolean
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 100
        maximum: 500
  responses:
    Error:
      description: 표준 error envelope이에요.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    APIIndexResponse:
      type: object
      required: [version, links]
      properties:
        version:
          type: string
        commit:
          type: string
        links:
          type: object
          additionalProperties:
            type: string
    VersionResponse:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        providers:
          type: array
          items:
            type: string
    CapabilityResponse:
      type: object
      required: [version, features, providers, limits]
      properties:
        version:
          type: string
        commit:
          type: string
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
        default_mcp_servers:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        limits:
          $ref: '#/components/schemas/Limit'
    Limit:
      type: object
      required: [max_request_bytes]
      properties:
        max_request_bytes:
          type: integer
          format: int64
        max_concurrent_runs:
          type: integer
        run_timeout_seconds:
          type: integer
    DiagnosticsResponse:
      type: object
      required: [ok, version, time, checks, providers, features, default_mcp_servers, max_request_bytes]
      properties:
        ok:
          type: boolean
        version:
          type: string
        commit:
          type: string
        time:
          type: string
          format: date-time
        checks:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticCheck'
        providers:
          type: integer
        features:
          type: integer
        default_mcp_servers:
          type: integer
        max_request_bytes:
          type: integer
          format: int64
        max_concurrent_runs:
          type: integer
        run_timeout_seconds:
          type: integer
        run_runtime:
          $ref: '#/components/schemas/RunRuntimeStats'
    DiagnosticCheck:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        message:
          type: string
    RunRuntimeStats:
      type: object
      properties:
        tracked_runs:
          type: integer
        active_runs:
          type: integer
        queued_runs:
          type: integer
        running_runs:
          type: integer
        cancelling_runs:
          type: integer
        terminal_runs:
          type: integer
        max_concurrent_runs:
          type: integer
        occupied_run_slots:
          type: integer
        available_run_slots:
          type: integer
        run_timeout_seconds:
          type: integer
    Feature:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        description:
          type: string
        endpoints:
          type: array
          items:
            type: string
    ProviderListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
    Provider:
      type: object
      required: [name]
      properties:
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        models:
          type: array
          items:
            type: string
        default_model:
          type: string
        capabilities:
          type: object
          additionalProperties: true
        auth_status:
          type: string
        auth_env:
          type: array
          description: provider 인증에 사용할 수 있는 환경변수 이름 목록이에요. secret 값은 포함하지 않아요.
          items:
            type: string
        conversion:
          $ref: '#/components/schemas/Conversion'
    Conversion:
      type: object
      properties:
        request_converter:
          type: string
        response_converter:
          type: string
        call:
          type: string
        stream:
          type: string
        source:
          type: string
        operations:
          type: array
          items:
            type: string
    ModelListResponse:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/Model'
    Model:
      type: object
      required: [id, provider]
      properties:
        id:
          type: string
        provider:
          type: string
        display_name:
          type: string
        default:
          type: boolean
        capabilities:
          type: object
          additionalProperties: true
        auth_status:
          type: string
    StatsResponse:
      type: object
      required: [sessions, turns, events, todos, checkpoints, runs, resources]
      properties:
        sessions:
          type: integer
        turns:
          type: integer
        events:
          type: integer
        todos:
          type: integer
        checkpoints:
          type: integer
        total_runs:
          type: integer
          description: 모든 run 상태 카운트의 합계예요.
        runs:
          type: object
          additionalProperties:
            type: integer
        total_resources:
          type: integer
          description: 모든 resource kind 카운트의 합계예요.
        resources:
          type: object
          additionalProperties:
            type: integer
    FileListResponse:
      type: object
      required: [project_root, path, entries]
      properties:
        project_root:
          type: string
        path:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FileEntry'
    FileEntry:
      type: object
      required: [name, path, kind, size]
      properties:
        name:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [file, directory]
        size:
          type: integer
          format: int64
        mod_time:
          type: string
          format: date-time
    FileContentResponse:
      type: object
      required: [project_root, path, content]
      properties:
        project_root:
          type: string
        path:
          type: string
        content:
          type: string
        content_bytes:
          type: integer
          description: 응답 content의 byte 수예요.
        file_bytes:
          type: integer
          format: int64
          description: 원본 파일 전체 byte 수예요.
        content_truncated:
          type: boolean
          description: max_bytes나 line range 때문에 content가 파일 전체보다 작게 반환됐는지 알려줘요.
    FileGlobResponse:
      type: object
      required: [project_root, pattern, paths]
      properties:
        project_root:
          type: string
        pattern:
          type: string
        paths:
          type: array
          items:
            type: string
        total_paths:
          type: integer
          description: limit 적용 전 glob 결과 수예요.
        limit:
          type: integer
          description: 이번 응답에 적용한 path 개수 제한이에요.
        paths_truncated:
          type: boolean
          description: limit 때문에 paths가 잘렸는지 알려줘요.
    FileGrepResponse:
      type: object
      required: [project_root, pattern, matches]
      properties:
        project_root:
          type: string
        pattern:
          type: string
        path_glob:
          type: string
        regex:
          type: boolean
        matches:
          type: array
          items:
            $ref: '#/components/schemas/FileGrepMatch'
    FileGrepMatch:
      type: object
      required: [path, line, excerpt]
      properties:
        path:
          type: string
        line:
          type: integer
        excerpt:
          type: string
    FilePatchRequest:
      type: object
      required: [project_root, patch_text]
      properties:
        project_root:
          type: string
        patch_text:
          type: string
    FilePatchResponse:
      type: object
      required: [project_root, applied]
      properties:
        project_root:
          type: string
        applied:
          type: boolean
    FileWriteRequest:
      type: object
      required: [project_root, path, content]
      properties:
        project_root:
          type: string
        path:
          type: string
        content:
          type: string
    GitStatusResponse:
      type: object
      required: [project_root, entries]
      properties:
        project_root:
          type: string
        branch:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/GitStatusEntry'
    GitStatusEntry:
      type: object
      required: [xy, path, raw]
      properties:
        xy:
          type: string
        path:
          type: string
        raw:
          type: string
    GitDiffResponse:
      type: object
      required: [project_root, diff]
      properties:
        project_root:
          type: string
        path:
          type: string
        diff:
          type: string
