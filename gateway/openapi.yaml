        redacted:
          type: boolean
        turns:
          type: array
          items:
            $ref: '#/components/schemas/Turn'
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        todos:
          type: array
          items:
            $ref: '#/components/schemas/Todo'
        checkpoints:
          type: array
          items:
            $ref: '#/components/schemas/Checkpoint'
        runs:
          type: array
          items:
            $ref: '#/components/schemas/Run'
        resources:
