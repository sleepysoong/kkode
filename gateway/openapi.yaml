          type: string
          description: Run event replay/SSE URL이에요. `/api/v1/runs/{run_id}/events` 형식으로 제공해요.
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        error:
          type: string
        metadata:
          type: object
          maxProperties: 64
          propertyNames:
            type: string
            maxLength: 128
            pattern: '^[A-Za-z0-9_.-]+$'
          additionalProperties:
            type: string
            maxLength: 1024
