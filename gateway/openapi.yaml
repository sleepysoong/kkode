  /api/v1/runs/{run_id}/events:
    get:
      operationId: getRunsByRunIdEvents
      summary: run 상태 변경을 JSON 또는 SSE로 받아요.
      parameters:
        - $ref: '#/components/parameters/RunID'
        - in: query
          name: after_seq
          schema:
            type: integer
            default: 0
          description: 이 seq 이후 durable run event만 replay해요.
        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
        - in: query
          name: stream
          schema:
            type: boolean
          description: true면 run 상태 변경을 text/event-stream으로 받아요. 잘못된 boolean 값은 400으로 거부해요.
        - in: query
          name: heartbeat_ms
          schema:
            type: integer
            default: 15000
            minimum: 0
            maximum: 300000
          description: SSE idle heartbeat 주기예요. 잘못된 값은 400으로 거부하고 0은 기본 15초, 너무 낮은 값은 10ms로 보정해요.
      responses:
        '200':
          description: run event snapshot 또는 live stream이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEventListResponse'
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/runs/{run_id}/transcript:
    get:
      operationId: getRunsByRunIdTranscript
      summary: run 하나에 해당하는 turn, session event, run event transcript를 조회해요.
      parameters:
        - $ref: '#/components/parameters/RunID'
        - in: query
          name: redact
          schema:
            type: boolean
            default: true
          description: false면 secret redaction 없이 원문에 가깝게 반환해요. 잘못된 boolean 값은 400으로 거부해요.
        - in: query
          name: event_limit
          schema:
            type: integer
            default: 500
            maximum: 5000
          description: run turn에 연결된 session event를 읽을 최대 개수예요.
        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
          description: durable run event를 읽을 최대 개수예요.
        - in: query
          name: max_markdown_bytes
          schema:
            type: integer
            default: 1048576
            maximum: 8388608
          description: markdown preview를 이 byte 수까지 UTF-8 안전하게 잘라요. 0이면 제한하지 않아요.
      responses:
        '200':
          description: run 단위 transcript예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTranscriptResponse'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'

  /api/v1/runs/{run_id}/retry:
    post:
      operationId: postRunsByRunIdRetry
      summary: 기존 run의 prompt와 session으로 새 background run을 시작해요.
      parameters:
        - $ref: '#/components/parameters/RunID'
      responses:
        '202':
          description: retry run이 접수됐어요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
  /api/v1/runs/{run_id}/cancel:
    post:
      operationId: postRunsByRunIdCancel
      summary: background run을 취소해요.
      parameters:
        - $ref: '#/components/parameters/RunID'
      responses:
        '200':
          description: 취소 요청이 반영된 run이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SessionID:
      in: path
      name: session_id
      required: true
      schema:
        type: string
    RunID:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    ResourceID:
      in: path
      name: resource_id
      required: true
      schema:
        type: string
    Enabled:
      in: query
      name: enabled
      schema:
        type: boolean
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 100
        maximum: 500
    Offset:
      in: query
      name: offset
      schema:
        type: integer
        default: 0
        minimum: 0
  responses:
    Error:
      description: 표준 error envelope이에요.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    HealthResponse:
      type: object
      required: [ok, time]
      properties:
        ok:
          type: boolean
        time:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      required: [ready, time]
      properties:
        ready:
          type: boolean
        time:
          type: string
          format: date-time
    APIIndexResponse:
      type: object
      description: adapter bootstrap용 discovery index예요. links는 하위 호환 URL map이고 operations는 method-aware route catalog예요.
      required: [version, links, operations]
      properties:
        version:
          type: string
        commit:
          type: string
        links:
          type: object
          description: 기존 adapter가 쓰는 endpoint 이름별 URL map이에요.
          additionalProperties:
            type: string
        operations:
          type: array
          description: OpenAPI 다운로드 전에도 write/action route method를 추론 없이 알 수 있게 하는 endpoint catalog예요.
          items:
            $ref: '#/components/schemas/APIIndexOperation'
    APIIndexOperation:
      type: object
      description: API index에 노출되는 이름, HTTP method, path 조합이에요.
      required: [name, method, path]
      properties:
        name:
          type: string
          description: API index links map의 key와 같은 안정적인 operation 이름이에요.
        method:
          type: string
          description: 이 endpoint를 호출할 때 사용할 HTTP method예요.
          enum: [GET, POST, PUT, DELETE]
        path:
          type: string
          description: API root 기준 endpoint path예요.
    VersionResponse:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        providers:
          type: array
          items:
            type: string
    CapabilityResponse:
      type: object
      required: [version, features, providers, limits]
      properties:
        version:
          type: string
        commit:
          type: string
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        providers:
