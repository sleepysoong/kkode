openapi: 3.0.3
info:
  title: kkode Gateway API
  version: 0.1.0
  description: |
    kkode의 session-aware coding agent gateway API예요.
    REST는 session/run 제어면을 담당하고, SSE는 event replay/stream을 담당해요.
servers:
  - url: http://127.0.0.1:41234
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: 프로세스 health를 확인해요.
      security: []
      responses:
        '200':
          description: 정상이에요.
  /readyz:
    get:
      summary: gateway 준비 상태를 확인해요.
      security: []
      responses:
        '200':
          description: 준비됐어요.
  /api/v1/version:
    get:
      summary: gateway version과 provider 목록을 반환해요.
      responses:
        '200':
          description: version 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/v1/capabilities:
    get:
      summary: gateway 기능과 provider capability를 반환해요.
      responses:
        '200':
          description: gateway capability discovery 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
  /api/v1/providers:
    get:
      summary: gateway가 알고 있는 provider 목록을 반환해요.
      responses:
        '200':
          description: provider 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'
  /api/v1/files:
    get:
      summary: workspace 디렉터리 항목을 나열해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          schema:
            type: string
            default: .
      responses:
        '200':
          description: file entry 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/content:
    get:
      summary: workspace 파일 내용을 읽어요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          required: true
          schema:
            type: string
        - in: query
          name: offset_line
          schema:
            type: integer
        - in: query
          name: limit_lines
          schema:
            type: integer
        - in: query
          name: max_bytes
          schema:
            type: integer
      responses:
        '200':
          description: file content예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '400':
          $ref: '#/components/responses/Error'
    put:
      summary: workspace 파일 내용을 써요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileWriteRequest'
      responses:
        '200':
          description: 저장된 file content예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/tools:
    get:
      summary: 표준 file/shell/web tool 목록을 반환해요.
      responses:
        '200':
          description: tool 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'
  /api/v1/tools/call:
    post:
      summary: 표준 tool을 직접 실행해요.
      description: 권한 프롬프트 없이 project_root 안에서 file/shell/web tool을 바로 실행해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCallRequest'
      responses:
        '200':
          description: tool 실행 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    get:
      summary: session 목록을 반환해요.
      parameters:
        - in: query
          name: project_root
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: session 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
    post:
      summary: 새 session을 만들어요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '201':
          description: 생성된 session이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /api/v1/sessions/{session_id}:
    get:
      summary: session 상세를 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: session 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/fork:
    post:
      summary: 기존 session을 fork해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                at_turn_id:
                  type: string
      responses:
        '201':
          description: fork된 session이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /api/v1/sessions/{session_id}/events:
    get:
      summary: session event를 JSON 또는 SSE로 replay해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: after_seq
          schema:
            type: integer
            default: 0
        - in: query
          name: stream
          schema:
            type: boolean
          description: true면 text/event-stream으로 반환해요.
      responses:
        '200':
          description: event 목록 또는 SSE stream이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
            text/event-stream:
              schema:
                type: string
  /api/v1/sessions/{session_id}/checkpoints:
    get:
      summary: session checkpoint 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: checkpoint 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckpointListResponse'
    post:
      summary: session checkpoint를 저장해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Checkpoint'
      responses:
        '201':
          description: 저장된 checkpoint예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoint'
  /api/v1/sessions/{session_id}/checkpoints/{checkpoint_id}:
    get:
      summary: session checkpoint 상세를 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: path
          name: checkpoint_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: checkpoint 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoint'
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/sessions/{session_id}/todos:
    get:
      summary: session todo 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: todo 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
    put:
      summary: session todo 목록 전체를 교체해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoListResponse'
      responses:
        '200':
          description: 갱신된 todo 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
    post:
      summary: todo 하나를 추가하거나 같은 id를 갱신해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Todo'
      responses:
        '201':
          description: 갱신된 todo 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
  /api/v1/sessions/{session_id}/todos/{todo_id}:
    delete:
      summary: todo 하나를 삭제해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: path
          name: todo_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 삭제됐어요.
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/mcp/servers:
    get:
      summary: MCP server manifest 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/Enabled'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: MCP server manifest 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
    post:
      summary: MCP server manifest를 저장해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '201':
          description: 저장된 MCP server manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
  /api/v1/mcp/servers/{resource_id}:
    get:
      summary: MCP server manifest를 조회해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: MCP server manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: MCP server manifest를 갱신해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '200':
          description: 갱신된 MCP server manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
    delete:
      summary: MCP server manifest를 삭제해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '204':
          description: 삭제됐어요.
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/mcp/servers/{resource_id}/tools:
    get:
      summary: MCP stdio server를 probe해서 tools/list 결과를 반환해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: MCP tool 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPToolListResponse'
        '404':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /api/v1/mcp/servers/{resource_id}/tools/{tool_name}/call:
    post:
      summary: MCP stdio server tool을 직접 호출해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
        - in: path
          name: tool_name
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPToolCallRequest'
      responses:
        '200':
          description: MCP tool call 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPToolCallResponse'
        '404':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /api/v1/skills:
    get:
      summary: skill manifest 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/Enabled'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: skill manifest 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
    post:
      summary: skill manifest를 저장해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '201':
          description: 저장된 skill manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
  /api/v1/skills/{resource_id}:
    get:
      summary: skill manifest를 조회해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: skill manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: skill manifest를 갱신해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '200':
          description: 갱신된 skill manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
    delete:
      summary: skill manifest를 삭제해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '204':
          description: 삭제됐어요.
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/skills/{resource_id}/preview:
    get:
      summary: skill manifest의 SKILL.md 또는 README.md preview를 반환해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
        - in: query
          name: max_bytes
          schema:
            type: integer
            default: 65536
      responses:
        '200':
          description: skill preview예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillPreviewResponse'
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/subagents:
    get:
      summary: subagent manifest 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/Enabled'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: subagent manifest 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
    post:
      summary: subagent manifest를 저장해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '201':
          description: 저장된 subagent manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
  /api/v1/subagents/{resource_id}:
    get:
      summary: subagent manifest를 조회해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: subagent manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: subagent manifest를 갱신해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '200':
          description: 갱신된 subagent manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
    delete:
      summary: subagent manifest를 삭제해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '204':
          description: 삭제됐어요.
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/subagents/{resource_id}/preview:
    get:
      summary: subagent manifest를 실행 전 preview 형태로 반환해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: subagent preview예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubagentPreviewResponse'
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/lsp/symbols:
    get:
      summary: Go source symbol을 LSP-style로 검색해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
      responses:
        '200':
          description: symbol 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LSPSymbolListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/lsp/document-symbols:
    get:
      summary: Go 파일 하나의 document symbol outline을 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 파일 단위 symbol 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LSPSymbolListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/lsp/definitions:
    get:
      summary: Go symbol definition 위치를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: symbol
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: definition 위치 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LSPLocationListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/lsp/references:
    get:
      summary: Go symbol reference 위치를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: symbol
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: reference 위치 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LSPReferenceListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/runs:
    get:
      summary: background run 목록을 반환해요.
      parameters:
        - in: query
          name: session_id
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: run 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'
        '501':
          $ref: '#/components/responses/Error'
    post:
      summary: agent background run을 시작해요.
      description: gateway는 run을 즉시 접수하고 실제 agent 실행은 background RunManager에서 이어가요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunStartRequest'
      responses:
        '202':
          description: run이 접수됐어요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '501':
          $ref: '#/components/responses/Error'
  /api/v1/runs/{run_id}:
    get:
      summary: background run 상태를 조회해요.
      parameters:
        - $ref: '#/components/parameters/RunID'
      responses:
        '200':
          description: run 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'

  /api/v1/runs/{run_id}/events:
    get:
      summary: run 상태 변경을 JSON 또는 SSE로 받아요.
      parameters:
        - $ref: '#/components/parameters/RunID'
        - in: query
          name: after_seq
          schema:
            type: integer
            default: 0
          description: 이 seq 이후 durable run event만 replay해요.
        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
        - in: query
          name: stream
          schema:
            type: boolean
          description: true면 run 상태 변경을 text/event-stream으로 받아요.
      responses:
        '200':
          description: run event snapshot 또는 live stream이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEventListResponse'
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/runs/{run_id}/retry:
    post:
      summary: 기존 run의 prompt와 session으로 새 background run을 시작해요.
      parameters:
        - $ref: '#/components/parameters/RunID'
      responses:
        '202':
          description: retry run이 접수됐어요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
  /api/v1/runs/{run_id}/cancel:
    post:
      summary: background run을 취소해요.
      parameters:
        - $ref: '#/components/parameters/RunID'
      responses:
        '200':
          description: 취소 요청이 반영된 run이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/Error'
        '501':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SessionID:
      in: path
      name: session_id
      required: true
      schema:
        type: string
    RunID:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    ResourceID:
      in: path
      name: resource_id
      required: true
      schema:
        type: string
    Enabled:
      in: query
      name: enabled
      schema:
        type: boolean
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 100
        maximum: 500
  responses:
    Error:
      description: 표준 error envelope이에요.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    VersionResponse:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        providers:
          type: array
          items:
            type: string
    CapabilityResponse:
      type: object
      required: [version, features, providers]
      properties:
        version:
          type: string
        commit:
          type: string
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
    Feature:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        description:
          type: string
        endpoints:
          type: array
          items:
            type: string
    ProviderListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
    Provider:
      type: object
      required: [name]
      properties:
        name:
          type: string
        models:
          type: array
          items:
            type: string
        capabilities:
          type: object
          additionalProperties: true
        auth_status:
          type: string
    FileListResponse:
      type: object
      required: [project_root, path, entries]
      properties:
        project_root:
          type: string
        path:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FileEntry'
    FileEntry:
      type: object
      required: [name, path, kind, size]
      properties:
        name:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [file, directory]
        size:
          type: integer
          format: int64
        mod_time:
          type: string
          format: date-time
    FileContentResponse:
      type: object
      required: [project_root, path, content]
      properties:
        project_root:
          type: string
        path:
          type: string
        content:
          type: string
    FileWriteRequest:
      type: object
      required: [project_root, path, content]
      properties:
        project_root:
          type: string
        path:
          type: string
        content:
          type: string
    ToolListResponse:
      type: object
      required: [tools]
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
    Tool:
      type: object
      required: [kind, name]
      properties:
        kind:
          type: string
        name:
          type: string
        description:
          type: string
        parameters:
          type: object
          additionalProperties: true
        strict:
          type: boolean
    ToolCallRequest:
      type: object
      required: [project_root, tool]
      properties:
        project_root:
          type: string
        tool:
          type: string
        arguments:
          type: object
          additionalProperties: true
        call_id:
          type: string
        web_max_bytes:
          type: integer
          format: int64
    ToolCallResponse:
      type: object
      required: [tool]
      properties:
        call_id:
          type: string
        tool:
          type: string
        output:
          type: string
        error:
          type: string
    SessionCreateRequest:
      type: object
      required: [project_root, provider, model]
      properties:
        project_root:
          type: string
        provider:
          type: string
        model:
          type: string
        agent:
          type: string
        mode:
          type: string
          enum: [build, plan, ask]
        metadata:
          type: object
          additionalProperties:
            type: string
    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    Session:
      type: object
      required: [id, project_root, provider_name, model, agent_name, mode, turn_count, updated_at]
      properties:
        id:
          type: string
        project_root:
          type: string
        provider_name:
          type: string
        model:
          type: string
        agent_name:
          type: string
        mode:
          type: string
        summary:
          type: string
        turn_count:
          type: integer
        event_count:
          type: integer
        todo_count:
          type: integer
        last_response_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string
    EventListResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
    Event:
      type: object
      required: [seq, id, session_id, at, type]
      properties:
        seq:
          type: integer
        id:
          type: string
        session_id:
          type: string
        turn_id:
          type: string
        at:
          type: string
          format: date-time
        type:
          type: string
        tool:
          type: string
        payload:
          nullable: true
        error:
          type: string
    CheckpointListResponse:
      type: object
      required: [checkpoints]
      properties:
        checkpoints:
          type: array
          items:
            $ref: '#/components/schemas/Checkpoint'
    Checkpoint:
      type: object
      properties:
        id:
          type: string
        session_id:
          type: string
        turn_id:
          type: string
        created_at:
          type: string
          format: date-time
        payload:
          nullable: true
    TodoListResponse:
      type: object
      required: [todos]
      properties:
        todos:
          type: array
          items:
            $ref: '#/components/schemas/Todo'
    Todo:
      type: object
      required: [id, content, status, updated_at]
      properties:
        id:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        priority:
          type: string
        updated_at:
          type: string
          format: date-time
    RunStartRequest:
      type: object
      required: [session_id, prompt]
      properties:
        session_id:
          type: string
        prompt:
          type: string
        provider:
          type: string
        model:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        mcp_servers:
          type: array
          description: run에 연결할 MCP server resource id 목록이에요.
          items:
            type: string
        skills:
          type: array
          description: run에 연결할 skill resource id 목록이에요.
          items:
            type: string
        subagents:
          type: array
          description: run에 연결할 subagent resource id 목록이에요.
          items:
            type: string
    MCPToolListResponse:
      type: object
      required: [server, tools]
      properties:
        server:
          $ref: '#/components/schemas/Resource'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/MCPTool'
    MCPTool:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
    MCPToolCallRequest:
      type: object
      properties:
        arguments:
          type: object
          additionalProperties: true
    MCPToolCallResponse:
      type: object
      required: [server, tool, result]
      properties:
        server:
          $ref: '#/components/schemas/Resource'
        tool:
          type: string
        result:
          type: object
          additionalProperties: true
    LSPSymbolListResponse:
      type: object
      required: [symbols]
      properties:
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/LSPSymbol'
    LSPSymbol:
      type: object
      required: [name, kind, file, line, column]
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [function, method, type, var, const]
        file:
          type: string
        line:
          type: integer
        column:
          type: integer
        container:
          type: string
    LSPLocationListResponse:
      type: object
      required: [locations]
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LSPSymbol'
    LSPReferenceListResponse:
      type: object
      required: [references]
      properties:
        references:
          type: array
          items:
            $ref: '#/components/schemas/LSPReference'
    LSPReference:
      type: object
      required: [name, kind, file, line, column]
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [identifier, selector]
        file:
          type: string
        line:
          type: integer
        column:
          type: integer
        excerpt:
          type: string
    SubagentPreviewResponse:
      type: object
      required: [subagent, name]
      properties:
        subagent:
          $ref: '#/components/schemas/Resource'
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        prompt:
          type: string
        tools:
          type: array
          items:
            type: string
        mcp_servers:
          type: object
          additionalProperties:
            type: string
        skills:
          type: array
          items:
            type: string
        infer:
          type: boolean
    SkillPreviewResponse:
      type: object
      required: [skill, truncated]
      properties:
        skill:
          $ref: '#/components/schemas/Resource'
        directory:
          type: string
        file:
          type: string
        markdown:
          type: string
        truncated:
          type: boolean
    ResourceListResponse:
      type: object
      required: [resources]
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
    Resource:
      type: object
      required: [name]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [mcp_server, skill, subagent]
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunListResponse:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/Run'
    RunEventListResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/RunEvent'
    RunEvent:
      type: object
      required: [seq, type, run]
      properties:
        seq:
          type: integer
        at:
          type: string
          format: date-time
        type:
          type: string
        run:
          $ref: '#/components/schemas/Run'
    Run:
      type: object
      required: [id, session_id, status]
      properties:
        id:
          type: string
        session_id:
          type: string
        turn_id:
          type: string
        status:
          type: string
          enum: [queued, running, cancelling, completed, failed, cancelled]
        prompt:
          type: string
        events_url:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        error:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true
