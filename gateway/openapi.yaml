        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
          description: 각 run transcript에 포함할 run event replay 개수예요.
        - in: query
          name: event_limit
          schema:
            type: integer
            default: 500
            maximum: 5000
          description: 각 run turn에 연결된 session event 개수예요.
        - in: query
          name: redact
          schema:
            type: boolean
            default: true
          description: false면 secret redaction 없이 request transcript를 반환해요. 잘못된 boolean 값은 400으로 거부해요.
        - in: query
          name: max_markdown_bytes
          schema:
            type: integer
            default: 1048576
            maximum: 8388608
          description: request markdown preview와 각 run markdown preview를 이 byte 수까지 UTF-8 안전하게 잘라요. 0이면 제한하지 않아요.
      responses:
        '200':
          description: request id와 연결된 run transcript 묶음이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestCorrelationTranscriptResponse'
        '501':
          $ref: '#/components/responses/Error'
