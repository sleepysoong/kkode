        session_id:
          type: string
        turn_id:
          type: string
        status:
          type: string
          enum: [queued, running, cancelling, completed, failed, cancelled]
        prompt:
          type: string
        provider:
          type: string
        model:
          type: string
        working_directory:
          type: string
        mcp_servers:
          type: array
          items:
