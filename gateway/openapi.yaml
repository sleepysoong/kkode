openapi: 3.0.3
info:
  title: kkode Gateway API
  version: 0.1.0
  description: |
    kkode의 session-aware coding agent gateway API예요.
    REST는 session/run 제어면을 담당하고, SSE는 event replay/stream을 담당해요.
servers:
  - url: http://127.0.0.1:41234
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: 프로세스 health를 확인해요.
      security: []
      responses:
        '200':
          description: 정상이에요.
  /readyz:
    get:
      summary: gateway 준비 상태를 확인해요.
      security: []
      responses:
        '200':
          description: 준비됐어요.
  /api/v1:
    get:
      summary: API discovery index를 반환해요.
      responses:
        '200':
          description: 주요 API link 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIIndexResponse'
  /api/v1/openapi.yaml:
    get:
      summary: 현재 OpenAPI YAML 스펙을 반환해요.
      responses:
        '200':
          description: OpenAPI YAML 문서예요.
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/version:
    get:
      summary: gateway version과 provider 목록을 반환해요.
      responses:
        '200':
          description: version 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/v1/capabilities:
    get:
      summary: gateway 기능과 provider capability를 반환해요.
      responses:
        '200':
          description: gateway capability discovery 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
  /api/v1/diagnostics:
    get:
      summary: gateway 운영 진단 정보를 반환해요.
      responses:
        '200':
          description: diagnostics 응답이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsResponse'
  /api/v1/providers:
    get:
      summary: gateway가 알고 있는 provider 목록을 반환해요.
      responses:
        '200':
          description: provider 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'
  /api/v1/providers/{provider}:
    get:
      summary: provider 이름이나 alias로 provider 상세를 반환해요.
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      responses:
        '200':
          description: provider 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/models:
    get:
      summary: provider별 model catalog를 반환해요.
      parameters:
        - in: query
          name: provider
          schema:
            type: string
      responses:
        '200':
          description: model 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
  /api/v1/stats:
    get:
      summary: gateway dashboard 통계를 반환해요.
      responses:
        '200':
          description: 저장소 통계예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '501':
          $ref: '#/components/responses/Error'
  /api/v1/files:
    get:
      summary: workspace 디렉터리 항목을 나열해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          schema:
            type: string
            default: .
      responses:
        '200':
          description: file entry 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/content:
    get:
      summary: workspace 파일 내용을 읽어요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          required: true
          schema:
            type: string
        - in: query
          name: offset_line
          schema:
            type: integer
        - in: query
          name: limit_lines
          schema:
            type: integer
        - in: query
          name: max_bytes
          schema:
            type: integer
      responses:
        '200':
          description: file content예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '400':
          $ref: '#/components/responses/Error'
    put:
      summary: workspace 파일 내용을 써요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileWriteRequest'
      responses:
        '200':
          description: 저장된 file content예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContentResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/grep:
    get:
      summary: workspace 파일에서 문자열 또는 regex를 검색해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: pattern
          required: true
          schema:
            type: string
        - in: query
          name: path_glob
          schema:
            type: string
        - in: query
          name: regex
          schema:
            type: boolean
            default: false
        - in: query
          name: case_sensitive
          schema:
            type: boolean
            default: false
        - in: query
          name: max_matches
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: grep 검색 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileGrepResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/glob:
    get:
      summary: workspace 파일 경로를 glob 패턴으로 찾아요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: pattern
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 500
            maximum: 5000
      responses:
        '200':
          description: glob 검색 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileGlobResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/files/patch:
    post:
      summary: apply_patch 형식 patch를 workspace에 적용해요.
      description: 권한 프롬프트 없이 project_root 기준으로 즉시 적용해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilePatchRequest'
      responses:
        '200':
          description: patch 적용 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilePatchResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/git/status:
    get:
      summary: workspace git status를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
      responses:
        '200':
          description: git status 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitStatusResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/git/diff:
    get:
      summary: workspace git diff를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: path
          schema:
            type: string
        - in: query
          name: max_bytes
          schema:
            type: integer
            default: 1048576
      responses:
        '200':
          description: git diff 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitDiffResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/git/log:
    get:
      summary: workspace git log를 반환해요.
      parameters:
        - in: query
          name: project_root
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: git log 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitLogResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/tools:
    get:
      summary: 표준 file/shell/web tool 목록을 반환해요.
      responses:
        '200':
          description: tool 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'
  /api/v1/tools/{tool}:
    get:
      summary: 표준 tool 상세 schema를 반환해요.
      parameters:
        - in: path
          name: tool
          required: true
          schema:
            type: string
      responses:
        '200':
          description: tool 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/tools/call:
    post:
      summary: 표준 tool을 직접 실행해요.
      description: 권한 프롬프트 없이 표준 tool을 바로 실행해요. file/shell tool은 project_root가 필요하고 web_fetch는 project_root 없이도 실행할 수 있어요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCallRequest'
      responses:
        '200':
          description: tool 실행 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    get:
      summary: session 목록을 반환해요.
      parameters:
        - in: query
          name: project_root
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: session 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
    post:
      summary: 새 session을 만들어요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '201':
          description: 생성된 session이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /api/v1/sessions/import:
    post:
      summary: session export bundle을 import해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionImportRequest'
      responses:
        '201':
          description: import 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionImportResponse'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}:
    get:
      summary: session 상세를 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: session 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/export:
    get:
      summary: session export JSON을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: checkpoint_limit
          schema:
            type: integer
            default: 200
            maximum: 5000
        - in: query
          name: run_limit
          schema:
            type: integer
            default: 200
            maximum: 5000
        - in: query
          name: redact
          schema:
            type: boolean
            default: false
          description: true면 raw_session을 제외하고 secret 패턴을 마스킹해요.
      responses:
        '200':
          description: session export bundle이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionExportResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/compact:
    post:
      summary: session turn을 extractive summary로 압축해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCompactRequest'
      responses:
        '200':
          description: compaction 결과예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCompactResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/fork:
    post:
      summary: 기존 session을 fork해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                at_turn_id:
                  type: string
      responses:
        '201':
          description: fork된 session이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /api/v1/sessions/{session_id}/turns:
    get:
      summary: session turn 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: after_seq
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: turn 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnListResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/turns/{turn_id}:
    get:
      summary: session turn 상세를 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: path
          name: turn_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: turn 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Turn'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/transcript:
    get:
      summary: session transcript를 markdown 포함 JSON으로 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: redact
          schema:
            type: boolean
            default: true
          description: false면 secret redaction 없이 원문 transcript를 반환해요.
      responses:
        '200':
          description: session transcript예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/{session_id}/events:
    get:
      summary: session event를 JSON 또는 SSE로 replay해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: after_seq
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 500
            maximum: 5000
        - in: query
          name: stream
          schema:
            type: boolean
          description: true면 text/event-stream으로 반환해요.
      responses:
        '200':
          description: event 목록 또는 SSE stream이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
            text/event-stream:
              schema:
                type: string
  /api/v1/sessions/{session_id}/checkpoints:
    get:
      summary: session checkpoint 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: checkpoint 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckpointListResponse'
    post:
      summary: session checkpoint를 저장해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Checkpoint'
      responses:
        '201':
          description: 저장된 checkpoint예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoint'
  /api/v1/sessions/{session_id}/checkpoints/{checkpoint_id}:
    get:
      summary: session checkpoint 상세를 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: path
          name: checkpoint_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: checkpoint 상세예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoint'
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/sessions/{session_id}/todos:
    get:
      summary: session todo 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      responses:
        '200':
          description: todo 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
    put:
      summary: session todo 목록 전체를 교체해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoListResponse'
      responses:
        '200':
          description: 갱신된 todo 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
    post:
      summary: todo 하나를 추가하거나 같은 id를 갱신해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Todo'
      responses:
        '201':
          description: 갱신된 todo 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
  /api/v1/sessions/{session_id}/todos/{todo_id}:
    delete:
      summary: todo 하나를 삭제해요.
      parameters:
        - $ref: '#/components/parameters/SessionID'
        - in: path
          name: todo_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 삭제됐어요.
        '404':
          $ref: '#/components/responses/Error'

  /api/v1/prompts:
    get:
      summary: 내장 prompt template 목록을 반환해요.
      responses:
        '200':
          description: prompt template 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptTemplateListResponse'
  /api/v1/prompts/{template_name}:
    get:
      summary: 내장 prompt template 원문을 반환해요.
      parameters:
        - in: path
          name: template_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: prompt template 원문이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptTemplateResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/prompts/{template_name}/render:
    post:
      summary: 내장 prompt template을 입력 data로 렌더링해요.
      parameters:
        - in: path
          name: template_name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptRenderRequest'
      responses:
        '200':
          description: 렌더링된 prompt예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptRenderResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/mcp/servers:
    get:
      summary: MCP server manifest 목록을 반환해요.
      parameters:
        - $ref: '#/components/parameters/Enabled'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: MCP server manifest 목록이에요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
    post:
      summary: MCP server manifest를 저장해요.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '201':
          description: 저장된 MCP server manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
  /api/v1/mcp/servers/{resource_id}:
    get:
      summary: MCP server manifest를 조회해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: MCP server manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: MCP server manifest를 갱신해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '200':
          description: 갱신된 MCP server manifest예요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
    delete:
      summary: MCP server manifest를 삭제해요.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '204':
          description: 삭제됐어요.
        '404':
          $ref: '#/components/responses/Error'

