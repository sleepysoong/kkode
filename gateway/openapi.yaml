        priority:
          type: string
        updated_at:
          type: string
          format: date-time
    RunStartRequest:
      type: object
      required: [session_id, prompt]
      properties:
        session_id:
          type: string
        prompt:
          type: string
        provider:
          type: string
        model:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        mcp_servers:
          type: array
          description: run에 연결할 MCP server resource id 목록이에요.
          items:
            type: string
        skills:
          type: array
          description: run에 연결할 skill resource id 목록이에요.
          items:
            type: string
        subagents:
          type: array
          description: run에 연결할 subagent resource id 목록이에요.
          items:
            type: string
