          type: integer
          description: 제한 전 output byte 수예요.
        output_truncated:
          type: boolean
          description: max_output_bytes 때문에 output이 잘렸는지 알려줘요.
    SessionCreateRequest:
      type: object
      required: [project_root, provider, model]
      properties:
