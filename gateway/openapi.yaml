components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SessionID:
      in: path
      name: session_id
      required: true
      schema:
        type: string
    RunID:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    ResourceID:
      in: path
      name: resource_id
      required: true
      schema:
        type: string
    Enabled:
      in: query
      name: enabled
      schema:
        type: boolean
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        default: 100
        maximum: 500
  responses:
    Error:
      description: н‘ңмӨҖ error envelopeмқҙм—җмҡ”.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    APIIndexResponse:
      type: object
      required: [version, links]
      properties:
        version:
          type: string
        commit:
          type: string
        links:
          type: object
          additionalProperties:
            type: string
    VersionResponse:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        providers:
          type: array
          items:
            type: string
    CapabilityResponse:
      type: object
      required: [version, features, providers]
      properties:
        version:
          type: string
        commit:
          type: string
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
    Feature:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        description:
          type: string
        endpoints:
          type: array
          items:
            type: string
    ProviderListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
    Provider:
      type: object
      required: [name]
      properties:
        name:
          type: string
        models:
          type: array
          items:
            type: string
        default_model:
          type: string
        capabilities:
          type: object
          additionalProperties: true
        auth_status:
          type: string
    ModelListResponse:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/Model'
    Model:
      type: object
      required: [id, provider]
      properties:
        id:
          type: string
        provider:
          type: string
        display_name:
          type: string
        default:
          type: boolean
        capabilities:
          type: object
          additionalProperties: true
        auth_status:
          type: string
    StatsResponse:
      type: object
      required: [sessions, turns, events, todos, checkpoints, runs, resources]
      properties:
        sessions:
          type: integer
        turns:
          type: integer
        events:
          type: integer
        todos:
          type: integer
        checkpoints:
          type: integer
        runs:
          type: object
          additionalProperties:
            type: integer
        resources:
          type: object
          additionalProperties:
            type: integer
    FileListResponse:
      type: object
      required: [project_root, path, entries]
      properties:
